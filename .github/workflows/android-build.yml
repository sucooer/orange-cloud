name: Android OSS Release Build

on:
  push:
    tags:
      - 'v*'  # 只在推送 tag
  workflow_dispatch:  # 允许在 Actions 页面手动触发

jobs:
  build:
    name: Build Android OSS Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'  # Zulu 是 Azul 提供的 OpenJDK，GitHub Actions 支持
          cache: gradle

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x apps/android/gradlew

      - name: 🎯 Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: 📝 Create local.properties & override JDK config
        run: |
          cd apps/android
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "OAUTH_CLIENT_ID=${{ secrets.OAUTH_CLIENT_ID }}" >> local.properties
          # 禁用 Gradle toolchain 自动下载，使用系统提供的 JDK
          echo "org.gradle.java.installations.auto-download=false" >> gradle.properties
          # 临时删除 JetBrains JDK 要求，使用系统提供的 JDK 21
          rm -f gradle/gradle-daemon-jvm.properties

      - name: 🔐 Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          cd apps/android
          # .jks 写入 app/ 目录；keystore.properties 写入 rootProject（apps/android/）
          # signingConfigs 中 file() 相对于 app 模块解析，所以 storeFile 只需 "release.jks"
          echo "$KEYSTORE_BASE64" | base64 -d > app/release.jks
          # 用 GitHub mask 机制保护密码：写入文件后立即 unset，避免出现在日志/stacktrace 中
          STORE_PW="${{ secrets.KEYSTORE_PASSWORD }}"
          KEY_PW="${{ secrets.KEY_PASSWORD }}"
          echo "::add-mask::$STORE_PW"
          echo "::add-mask::$KEY_PW"
          printf 'storeFile=release.jks\nstorePassword=%s\nkeyAlias=release\nkeyPassword=%s\n' "$STORE_PW" "$KEY_PW" > keystore.properties
          unset STORE_PW KEY_PW

      - name: 🔨 Build OSS Release APK
        run: |
          cd apps/android
          ./gradlew assembleOssRelease --no-daemon --stacktrace

      - name: 📊 Get version info
        id: version
        run: |
          cd apps/android
          VERSION_NAME=$(awk '/defaultConfig/,/}/ { if ($0 ~ /versionName =/) { gsub(/"/, "", $3); print $3; exit } }' app/build.gradle.kts)
          VERSION_CODE=$(awk '/defaultConfig/,/}/ { if ($0 ~ /versionCode =/) { print $3; exit } }' app/build.gradle.kts)
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "✅ Version: $VERSION_NAME (code: $VERSION_CODE)"

      - name: 📦 Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: orange-cloud-oss-v${{ steps.version.outputs.version_name }}
          path: apps/android/app/build/outputs/apk/oss/release/*.apk
          retention-days: 90

      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: apps/android/app/build/outputs/apk/oss/release/*.apk
          name: Orange Cloud OSS v${{ steps.version.outputs.version_name }}
          body: |
            ## Orange Cloud OSS Release v${{ steps.version.outputs.version_name }}
            
            ### 📥 下载
            - APK 文件请查看下方 Assets
            - 版本代码：${{ steps.version.outputs.version_code }}
            
            ### 📝 更新日志
            请查看项目 [Changelog](https://github.com/${{ github.repository }}/blob/main/packages/changelog/android.json)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
